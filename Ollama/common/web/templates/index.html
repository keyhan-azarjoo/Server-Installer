<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama</title>
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--border:#334155;--border2:#475569;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;--accent:#3b82f6;--accent2:#2563eb;--accent3:#1d4ed8;--danger:#ef4444;--success:#22c55e;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* ── Sidebar ───────────────────────────── */
.sidebar{width:300px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;transition:width .3s}
.sidebar.collapsed{width:0;overflow:hidden;border:none}
.sb-top{padding:16px;border-bottom:1px solid var(--border)}
.sb-top-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sb-top h1{font-size:20px;font-weight:800;color:var(--accent);flex:1}
.sb-top h1 span{font-size:11px;font-weight:400;color:var(--text3);margin-left:6px}
.new-chat-btn{background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:background .15s}
.new-chat-btn:hover{background:var(--accent3)}
.sb-search{margin-top:10px}
.sb-search input{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
.sb-search input:focus{border-color:var(--accent)}
.chat-list{flex:1;overflow-y:auto;padding:6px}
.chat-date{font-size:11px;color:var(--text3);padding:8px 12px 4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.chat-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px;margin-bottom:1px;transition:background .1s}
.chat-item:hover{background:var(--border)}
.chat-item.active{background:var(--border);color:var(--text)}
.chat-item .ci-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .ci-actions{display:none;gap:2px}
.chat-item:hover .ci-actions{display:flex}
.ci-btn{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:2px 4px;border-radius:4px}
.ci-btn:hover{color:var(--text);background:var(--border2)}
.ci-btn.del:hover{color:var(--danger)}
.sb-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-footer-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;flex:1;text-align:center;transition:all .15s}
.sb-footer-btn:hover{background:var(--border);color:var(--text)}

/* ── Main ──────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.toggle-sb{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px}
.toggle-sb:hover{background:var(--border)}
.hdr-model select{background:var(--border);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:7px 12px;font-size:13px;outline:none;min-width:200px;cursor:pointer}
.hdr-model select:focus{border-color:var(--accent)}
.hdr-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);flex-shrink:0}
.hdr-dot.ok{background:var(--success)}
.hdr-note{margin-left:4px;color:#fbbf24;font-size:12px;max-width:420px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-spacer{flex:1}
.hdr-btn{background:var(--border);color:var(--text2);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hdr-btn:hover{background:var(--border2);color:var(--text)}
.hdr-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}

/* Settings */
.settings-panel{display:none;background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 20px;flex-shrink:0;overflow-y:auto;max-height:260px}
.settings-panel.open{display:block}
.stg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;max-width:740px}
.stg-grp{display:flex;flex-direction:column;gap:4px}
.stg-grp label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stg-grp input,.stg-grp textarea,.stg-grp select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
.stg-grp input:focus,.stg-grp textarea:focus{border-color:var(--accent)}
.stg-grp textarea{resize:vertical;min-height:64px}
.stg-grp.full{grid-column:1/-1}
.range-row{display:flex;align-items:center;gap:8px}
.range-row input[type=range]{flex:1;accent-color:var(--accent)}
.range-val{font-size:12px;color:var(--accent);min-width:32px;text-align:right;font-weight:600}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px}

/* Empty state */
.empty-state{margin:auto;text-align:center;max-width:500px;padding:40px}
.empty-state h2{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.empty-state p{color:var(--text3);font-size:15px;line-height:1.6;margin-bottom:24px}
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sug-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:13px;color:var(--text2);cursor:pointer;text-align:left;transition:border-color .15s,color .15s}
.sug-card:hover{border-color:var(--accent);color:var(--text)}
.sug-card strong{display:block;color:var(--text);margin-bottom:4px;font-size:13px}

/* Messages */
.msg{max-width:85%;display:flex;flex-direction:column;gap:4px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start;max-width:90%}
.msg .bubble{padding:14px 18px;border-radius:16px;line-height:1.7;font-size:14px;word-break:break-word}
.msg.user .bubble{background:var(--accent2);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg .meta{font-size:11px;color:var(--text3);padding:0 6px;display:flex;gap:8px;align-items:center}
.msg.user .meta{justify-content:flex-end}
.msg .meta button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:2px}
.msg .meta button:hover{color:var(--text)}
.typing{align-self:flex-start;color:var(--text3);font-size:14px;padding:8px 0}
.typing span{display:inline-block;animation:bounce 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}

/* Markdown */
.msg.assistant .bubble pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin:10px 0;overflow-x:auto;font-size:13px;line-height:1.6;position:relative}
.msg.assistant .bubble pre code{background:none;border:none;padding:0;font-size:13px;color:var(--text)}
.msg.assistant .bubble code{background:var(--border);padding:2px 6px;border-radius:4px;font-size:13px}
.msg.assistant .bubble p{margin:6px 0}
.msg.assistant .bubble ul,.msg.assistant .bubble ol{margin:6px 0;padding-left:22px}
.msg.assistant .bubble li{margin:4px 0;line-height:1.6}
.msg.assistant .bubble h1,.msg.assistant .bubble h2,.msg.assistant .bubble h3{margin:12px 0 6px;color:var(--accent)}
.msg.assistant .bubble h1{font-size:20px} .msg.assistant .bubble h2{font-size:17px} .msg.assistant .bubble h3{font-size:15px}
.msg.assistant .bubble blockquote{border-left:3px solid var(--accent);padding:4px 12px;margin:8px 0;color:var(--text2);background:rgba(59,130,246,0.05);border-radius:0 6px 6px 0}
.msg.assistant .bubble table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13px}
.msg.assistant .bubble th,.msg.assistant .bubble td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.msg.assistant .bubble th{background:var(--border);font-weight:600}
.msg.assistant .bubble hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--border2);color:var(--text);border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .2s}
pre:hover .copy-btn{opacity:1}
.copy-btn:hover{background:var(--accent)}

/* Input area */
.input-area{background:var(--bg2);border-top:1px solid var(--border);padding:12px 20px;flex-shrink:0}
.input-container{max-width:900px;margin:0 auto}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:14px;padding:12px 16px;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:48px;max-height:200px;transition:border-color .15s}
.input-row textarea:focus{border-color:var(--accent)}
.input-row textarea::placeholder{color:var(--text4)}
.send-btn{background:var(--accent2);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;min-width:72px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.send-btn:hover{background:var(--accent3)}
.send-btn:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
.send-btn.stop{background:var(--danger)}
.send-btn.stop:hover{background:#dc2626}
.attach-btn{background:var(--border);color:var(--text2);border:1px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:18px;cursor:pointer;transition:all .15s;line-height:1;flex-shrink:0}
.attach-btn:hover{background:var(--border2);color:var(--text)}
.file-preview{display:flex;gap:8px;flex-wrap:wrap;padding:8px 0}
.file-thumb{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.file-thumb img{width:80px;height:80px;object-fit:cover;display:block}
.file-thumb .file-icon{width:80px;height:80px;display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:11px;color:var(--text2);text-align:center;padding:8px;word-break:break-all}
.file-thumb .file-remove{position:absolute;top:2px;right:2px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.msg-images{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.msg-images img{max-width:200px;max-height:200px;border-radius:8px;border:1px solid var(--border);cursor:pointer}
.msg-images img:hover{opacity:.85}
.img-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-modal img{max-width:90%;max-height:90%;border-radius:8px}
.input-hint{font-size:11px;color:var(--text4);margin-top:6px;text-align:center}

/* Models panel */
.models-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.models-overlay.open{display:flex}
.models-dialog{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:90%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
.md-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.md-header h2{flex:1;font-size:18px;font-weight:700}
.md-close{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:4px}
.md-close:hover{color:var(--text)}
.md-body{flex:1;overflow-y:auto;padding:16px 24px}
.md-section{margin-bottom:20px}
.md-section h3{font-size:13px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.pull-row{display:flex;gap:8px;margin-bottom:8px}
.pull-row input{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;outline:none}
.pull-row input:focus{border-color:var(--accent)}
.pull-row button{background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:600;cursor:pointer;white-space:nowrap}
.pull-row button:hover{background:var(--accent3)}
.pull-status{font-size:12px;color:var(--text2);min-height:18px;margin-bottom:8px}
.model-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.model-card:hover{border-color:var(--border2)}
.mc-info{flex:1;min-width:0}
.mc-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-detail{font-size:12px;color:var(--text3);margin-top:2px}
.mc-actions{display:flex;gap:6px}
.mc-btn{background:var(--border);color:var(--text2);border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;transition:all .15s}
.mc-btn:hover{background:var(--border2);color:var(--text)}
.mc-btn.del{color:var(--danger)}
.mc-btn.del:hover{background:#7f1d1d;color:#fca5a5}

/* Responsive */
@media(max-width:768px){.sidebar{position:fixed;z-index:100;width:300px;left:-300px;transition:left .3s}.sidebar.mobile-open{left:0}.suggestions{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-top-row">
      <h1>Ollama<span id="modelCount"></span></h1>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ New Conversation</button>
    <div class="sb-search"><input type="text" id="searchChats" placeholder="Search conversations..." oninput="renderChatList()"></div>
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="sb-footer">
    <button class="sb-footer-btn" onclick="exportChats()">Export</button>
    <button class="sb-footer-btn" onclick="importChats()">Import</button>
    <button class="sb-footer-btn" onclick="clearAllChats()">Clear All</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="header">
    <button class="toggle-sb" onclick="toggleSidebar()">&#9776;</button>
    <div class="hdr-model"><select id="modelSelect"><option value="">Loading...</option></select></div>
    <div class="hdr-status"><div class="hdr-dot" id="statusDot"></div><span id="statusText">Connecting...</span></div>
    <div class="hdr-note" id="runtimeNote" style="display:none"></div>
    <div class="hdr-spacer"></div>
    <button class="hdr-btn" id="settingsBtn" onclick="toggleSettings()">Settings</button>
    <button class="hdr-btn" onclick="toggleModels()">Models</button>
    <button class="hdr-btn" id="logoutBtn" onclick="doLogout()" style="display:none">Logout</button>
  </div>

  <!-- Settings -->
  <div class="settings-panel" id="settingsPanel">
    <div class="stg-grid">
      <div class="stg-grp full">
        <label>System Prompt</label>
        <textarea id="systemPrompt" placeholder="You are a helpful assistant..." rows="3"></textarea>
      </div>
      <div class="stg-grp">
        <label>Temperature</label>
        <div class="range-row"><input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7"><span class="range-val" id="tempVal">0.7</span></div>
      </div>
      <div class="stg-grp">
        <label>Top P</label>
        <div class="range-row"><input type="range" id="topP" min="0" max="1" step="0.05" value="0.9"><span class="range-val" id="topPVal">0.9</span></div>
      </div>
      <div class="stg-grp">
        <label>Context Length</label>
        <input type="number" id="contextLen" value="2048" min="256" max="131072" step="256">
      </div>
      <div class="stg-grp">
        <label>Max Tokens (0 = unlimited)</label>
        <input type="number" id="maxTokens" value="0" min="0" max="131072" step="64">
      </div>
      <div class="stg-grp">
        <label>Repeat Penalty</label>
        <div class="range-row"><input type="range" id="repeatPenalty" min="0" max="2" step="0.1" value="1.1"><span class="range-val" id="rpVal">1.1</span></div>
      </div>
      <div class="stg-grp">
        <label>Seed (-1 = random)</label>
        <input type="number" id="seed" value="-1" min="-1">
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-container">
      <div class="file-preview" id="filePreview"></div>
      <div class="input-row">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Attach image or file">&#128206;</button>
        <textarea id="msgInput" placeholder="Message Ollama... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
      <div class="input-hint">Ollama runs locally on your machine. Your conversations stay private.</div>
    </div>
  </div>
</div>

<!-- Models Dialog -->
<div class="models-overlay" id="modelsOverlay" onclick="if(event.target===this)toggleModels()">
  <div class="models-dialog">
    <div class="md-header"><h2>Model Library</h2><button class="md-close" onclick="toggleModels()">&times;</button></div>
    <div class="md-body">
      <div class="md-section">
        <h3>Pull a Model</h3>
        <div class="pull-row">
          <input id="pullInput" placeholder="e.g. llama3.2, mistral, gemma2, qwen2.5" onkeydown="if(event.key==='Enter')pullModel()">
          <button onclick="pullModel()">Pull</button>
        </div>
        <div class="pull-status" id="pullStatus"></div>
      </div>
      <div class="md-section">
        <h3>Installed Models</h3>
        <div id="modelsList"></div>
      </div>
      <div class="md-section">
        <h3>Running Models</h3>
        <div id="runningModels"><div style="color:var(--text3);font-size:13px">Loading...</div></div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
<input type="file" id="fileInput" accept="image/*,.pdf,.txt,.md,.csv,.json,.py,.js,.html,.css,.xml,.yaml,.yml,.log,.sh,.bat" multiple style="display:none" onchange="handleFiles(event)">
<div class="img-modal" id="imgModal" style="display:none" onclick="this.style.display='none'"><img id="imgModalImg"></div>

<script>
var BASE = '';
var conversations = {};
var currentChatId = null;
var streaming = false;
var abortController = null;
var savedModel = '';
var runtimeInfo = null;

// ── Storage ──────────────────────────────────────────────
function saveConvs() { try { localStorage.setItem('ollama_chats', JSON.stringify(conversations)); } catch(e) {} }
function loadConvs() { try { var s = localStorage.getItem('ollama_chats'); if (s) conversations = JSON.parse(s); } catch(e) {} }
function saveSettings() {
  try { localStorage.setItem('ollama_cfg', JSON.stringify({
    systemPrompt: document.getElementById('systemPrompt').value,
    temperature: document.getElementById('temperature').value,
    topP: document.getElementById('topP').value,
    contextLen: document.getElementById('contextLen').value,
    maxTokens: document.getElementById('maxTokens').value,
    repeatPenalty: document.getElementById('repeatPenalty').value,
    seed: document.getElementById('seed').value,
    model: document.getElementById('modelSelect').value
  })); } catch(e) {}
}
function loadSettingsFromStorage() {
  try { var s = localStorage.getItem('ollama_cfg'); if (!s) return null; var c = JSON.parse(s);
    if (c.systemPrompt) document.getElementById('systemPrompt').value = c.systemPrompt;
    if (c.temperature) { document.getElementById('temperature').value = c.temperature; document.getElementById('tempVal').textContent = c.temperature; }
    if (c.topP) { document.getElementById('topP').value = c.topP; document.getElementById('topPVal').textContent = c.topP; }
    if (c.contextLen) document.getElementById('contextLen').value = c.contextLen;
    if (c.maxTokens !== undefined) document.getElementById('maxTokens').value = c.maxTokens;
    if (c.repeatPenalty) { document.getElementById('repeatPenalty').value = c.repeatPenalty; document.getElementById('rpVal').textContent = c.repeatPenalty; }
    if (c.seed !== undefined) document.getElementById('seed').value = c.seed;
    return c;
  } catch(e) {} return null;
}

// ── Chat Management ──────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }

function newChat() {
  var id = genId();
  conversations[id] = { id: id, title: 'New Chat', messages: [], created: Date.now(), model: '' };
  currentChatId = id; saveConvs(); renderChatList(); renderMessages();
  document.getElementById('msgInput').focus();
}

function switchChat(id) { if (streaming) return; currentChatId = id; renderChatList(); renderMessages(); }

function deleteChat(id, e) {
  e.stopPropagation();
  delete conversations[id];
  if (currentChatId === id) { var k = Object.keys(conversations); currentChatId = k.length ? k[k.length-1] : null; }
  saveConvs(); renderChatList(); renderMessages();
}

function renameChat(id, e) {
  e.stopPropagation();
  var conv = conversations[id]; if (!conv) return;
  var name = prompt('Rename conversation:', conv.title);
  if (name && name.trim()) { conv.title = name.trim(); saveConvs(); renderChatList(); }
}

function updateTitle(id) {
  var conv = conversations[id]; if (!conv) return;
  for (var i = 0; i < conv.messages.length; i++) {
    if (conv.messages[i].role === 'user') {
      var t = conv.messages[i].content.substring(0, 45);
      conv.title = conv.messages[i].content.length > 45 ? t + '...' : t;
      break;
    }
  }
  saveConvs(); renderChatList();
}

function renderChatList() {
  var list = document.getElementById('chatList');
  var search = (document.getElementById('searchChats').value || '').toLowerCase();
  var keys = Object.keys(conversations).sort(function(a, b) { return (conversations[b].created || 0) - (conversations[a].created || 0); });
  var html = ''; var lastDate = '';
  for (var i = 0; i < keys.length; i++) {
    var c = conversations[keys[i]];
    if (search && (c.title || '').toLowerCase().indexOf(search) === -1) continue;
    var d = new Date(c.created || 0); var ds = d.toLocaleDateString();
    var today = new Date().toLocaleDateString();
    var yesterday = new Date(Date.now() - 86400000).toLocaleDateString();
    var label = ds === today ? 'Today' : ds === yesterday ? 'Yesterday' : ds;
    if (label !== lastDate) { html += '<div class="chat-date">' + label + '</div>'; lastDate = label; }
    var active = keys[i] === currentChatId ? ' active' : '';
    html += '<div class="chat-item' + active + '" onclick="switchChat(\'' + keys[i] + '\')">'
      + '<span class="ci-title">' + esc(c.title || 'New Chat') + '</span>'
      + '<span class="ci-actions">'
      + '<button class="ci-btn" onclick="renameChat(\'' + keys[i] + '\',event)" title="Rename">&#9998;</button>'
      + '<button class="ci-btn del" onclick="deleteChat(\'' + keys[i] + '\',event)" title="Delete">&times;</button>'
      + '</span></div>';
  }
  if (!html) html = '<div style="text-align:center;color:var(--text4);padding:40px 16px;font-size:13px">No conversations yet</div>';
  list.innerHTML = html;
}

// ── Markdown ─────────────────────────────────────────────
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function md(text) {
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    return '<pre><code class="lang-' + lang + '">' + esc(code.trim()) + '</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></pre>';
  });
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  text = text.replace(/^---$/gm, '<hr>');
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  text = text.replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>');
  text = text.replace(/^[*\-]\s(.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  text = text.replace(/<\/ul>\s*<ul>/g, '');
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:var(--accent)">$1</a>');
  // Paragraphs
  var parts = text.split(/<pre[\s\S]*?<\/pre>/g);
  var pres = text.match(/<pre[\s\S]*?<\/pre>/g) || [];
  var result = '';
  for (var i = 0; i < parts.length; i++) {
    result += parts[i].replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
    if (i < pres.length) result += pres[i];
  }
  return '<p>' + result + '</p>';
}

function copyCode(btn) {
  var code = btn.parentElement.querySelector('code');
  navigator.clipboard.writeText(code.textContent);
  btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
}

function copyMessage(idx) {
  var conv = conversations[currentChatId];
  if (conv && conv.messages[idx]) {
    navigator.clipboard.writeText(conv.messages[idx].content);
  }
}

// ── Render Messages ──────────────────────────────────────
function renderMessages() {
  var area = document.getElementById('chatArea');
  if (!currentChatId || !conversations[currentChatId]) {
    area.innerHTML = '<div class="empty-state"><h2>Ollama Chat</h2><p>Start a conversation with any model. Your chats are stored locally and never leave your machine.</p>'
      + '<div class="suggestions">'
      + '<div class="sug-card" onclick="useSug(this)"><strong>Explain</strong>How does quantum computing work?</div>'
      + '<div class="sug-card" onclick="useSug(this)"><strong>Write</strong>A Python function to merge two sorted arrays</div>'
      + '<div class="sug-card" onclick="useSug(this)"><strong>Compare</strong>REST vs GraphQL for a mobile app backend</div>'
      + '<div class="sug-card" onclick="useSug(this)"><strong>Debug</strong>Why is my Docker container exiting with code 137?</div>'
      + '</div></div>';
    return;
  }
  var msgs = conversations[currentChatId].messages;
  if (!msgs.length) {
    area.innerHTML = '<div class="empty-state"><h2>New Conversation</h2><p>Type a message below to get started.</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i]; if (m.role === 'system') continue;
    var t = m.time ? new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
    if (m.role === 'user') {
      var userImgs = '';
      if (m.images && m.images.length > 0) {
        userImgs = '<div class="msg-images">';
        for (var ii = 0; ii < m.images.length; ii++) {
          userImgs += '<img src="' + m.images[ii] + '" onclick="showImage(this.src)">';
        }
        userImgs += '</div>';
      }
      html += '<div class="msg user"><div class="bubble">' + userImgs + esc(m.content) + '</div><div class="meta">' + t + ' <button onclick="copyMessage(' + i + ')" title="Copy">Copy</button></div></div>';
    } else {
      var info = (m.model ? esc(m.model) + ' &middot; ' : '') + t;
      html += '<div class="msg assistant"><div class="bubble">' + md(m.content) + '</div><div class="meta">' + info + ' <button onclick="copyMessage(' + i + ')" title="Copy">Copy</button></div></div>';
    }
  }
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

function useSug(el) {
  var text = el.textContent.replace(/^(Explain|Write|Compare|Debug)/, '').trim();
  document.getElementById('msgInput').value = text;
  document.getElementById('msgInput').focus();
}

function showRuntimeNote(text) {
  var note = document.getElementById('runtimeNote');
  if (!text) { note.style.display = 'none'; note.textContent = ''; return; }
  note.style.display = '';
  note.textContent = text;
  note.title = text;
}

function formatGiB(v) {
  return (typeof v === 'number' && !isNaN(v)) ? v.toFixed(1) + ' GiB' : '';
}

function runtimeMemoryHint() {
  if (!runtimeInfo) return '';
  if (runtimeInfo.deploy_mode !== 'docker') return '';
  var available = formatGiB(runtimeInfo.memory_available_gib);
  var limit = formatGiB(runtimeInfo.memory_limit_gib || runtimeInfo.memory_total_gib);
  if (runtimeInfo.host_os === 'darwin' || runtimeInfo.host_os === 'windows' || runtimeInfo.host_os === 'win32') {
    return 'Docker Desktop memory available to Ollama: ' + (available || 'unknown') + (limit ? ' of ' + limit : '') + '. Increase Docker Desktop RAM or use OS install.';
  }
  if (available) return 'Docker runtime memory available to Ollama: ' + available + '.';
  return '';
}

function enhanceMemoryError(text) {
  if (!text || text.indexOf('requires more system memory') === -1) return text;
  var extra = [];
  var runtimeHint = runtimeMemoryHint();
  if (runtimeHint) extra.push(runtimeHint);
  var ctxLen = parseInt(document.getElementById('contextLen').value, 10) || 2048;
  if (ctxLen > 2048) extra.push('Try lowering Context Length to 2048 or 1024.');
  extra.push('If this is Docker mode, Ollama is using Docker-visible memory, not full host RAM.');
  return extra.length ? text + '\n\n' + extra.join(' ') : text;
}

// ── Health & Models ──────────────────────────────────────
function checkHealth() {
  fetch(BASE + '/api/health').then(function(r) { return r.json(); }).then(function(j) {
    runtimeInfo = j.runtime || runtimeInfo;
    var serverOk = j.ollama_server !== false && j.status !== 'web_ui_only';
    document.getElementById('statusDot').className = 'hdr-dot' + (serverOk ? ' ok' : '');
    showRuntimeNote(runtimeMemoryHint());
    if (serverOk) {
      document.getElementById('statusText').textContent = 'Connected';
      loadModels();
      if (j.model_count !== undefined) document.getElementById('modelCount').textContent = j.model_count + ' models';
    } else {
      document.getElementById('statusText').textContent = 'Ollama server not running';
    }
  }).catch(function() {
    document.getElementById('statusDot').className = 'hdr-dot';
    document.getElementById('statusText').textContent = 'Web UI offline';
  });
}

function loadModels() {
  fetch(BASE + '/api/models').then(function(r) { return r.json(); }).then(function(j) {
    var sel = document.getElementById('modelSelect');
    var models = j.models || []; var prev = sel.value || savedModel;
    sel.innerHTML = models.length ? '' : '<option value="">No models installed</option>';
    for (var i = 0; i < models.length; i++) {
      var m = models[i]; var name = m.name || m.model;
      var sz = m.size ? (m.size / 1e9).toFixed(1) + ' GB' : '';
      var params = m.details ? (m.details.parameter_size || '') : '';
      var label = name + (params ? ' (' + params + ')' : sz ? ' (' + sz + ')' : '');
      var opt = document.createElement('option'); opt.value = name; opt.textContent = label;
      if (name === prev) opt.selected = true;
      sel.appendChild(opt);
    }
    // Models panel list
    var list = document.getElementById('modelsList');
    var html = '';
    for (var i = 0; i < models.length; i++) {
      var m = models[i]; var name = m.name || m.model;
      var sz = m.size ? (m.size / 1e9).toFixed(1) + ' GB' : '';
      var params = m.details ? (m.details.parameter_size || '') : '';
      var family = m.details ? (m.details.family || '') : '';
      var quant = m.details ? (m.details.quantization_level || '') : '';
      var detail = [params, family, quant, sz].filter(function(x){return x;}).join(' &middot; ');
      html += '<div class="model-card"><div class="mc-info"><div class="mc-name">' + esc(name) + '</div><div class="mc-detail">' + detail + '</div></div>'
        + '<div class="mc-actions"><button class="mc-btn" onclick="showModelInfo(\'' + esc(name) + '\')">Info</button>'
        + '<button class="mc-btn del" onclick="deleteModel(\'' + esc(name) + '\')">Delete</button></div></div>';
    }
    if (!html) html = '<div style="color:var(--text3);font-size:13px;padding:12px;text-align:center">No models installed. Pull one above.</div>';
    list.innerHTML = html;
    document.getElementById('modelCount').textContent = models.length + ' models';
  }).catch(function() {});
}

function loadRunningModels() {
  fetch(BASE + '/api/models/running').then(function(r) { return r.json(); }).then(function(j) {
    var el = document.getElementById('runningModels');
    var models = j.models || [];

  }).catch(function() {});
}

function showModelInfo(name) {
  fetch(BASE + '/api/models/info', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: name}) })
  .then(function(r) { return r.json(); }).then(function(j) {

}

// ── Send Message ─────────────────────────────────────────
function sendMessage() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim(); var model = document.getElementById('modelSelect').value;
  if (!text || !model || streaming) return;
  if (!currentChatId) newChat();
  var conv = conversations[currentChatId];
  conv.model = model;

  var sysPr = document.getElementById('systemPrompt').value.trim();
  var temp = parseFloat(document.getElementById('temperature').value);
  var topP = parseFloat(document.getElementById('topP').value);
  var ctxLen = parseInt(document.getElementById('contextLen').value) || 2048;
  var maxTok = parseInt(document.getElementById('maxTokens').value) || 0;
  var rp = parseFloat(document.getElementById('repeatPenalty').value);
  var seedVal = parseInt(document.getElementById('seed').value);

  // Collect attached files
  var msgImages = []; var msgFiles = []; var imageBase64s = [];
  for (var fi = 0; fi < pendingFiles.length; fi++) {
    if (pendingFiles[fi].isImage) {
      msgImages.push(pendingFiles[fi].dataUrl);
      imageBase64s.push(pendingFiles[fi].base64);
    } else {
      msgFiles.push({ name: pendingFiles[fi].name, content: atob(pendingFiles[fi].base64).substring(0, 5000) });
    }
  }
  // Add file contents to message text
  var fullText = text;
  for (var fi2 = 0; fi2 < msgFiles.length; fi2++) {
    fullText += '\n\n[File: ' + msgFiles[fi2].name + ']\n' + msgFiles[fi2].content;
  }

  conv.messages.push({ role: 'user', content: fullText, time: Date.now(), images: msgImages });
  pendingFiles = []; renderFilePreview();
  if (conv.messages.length <= 2) updateTitle(currentChatId);
  renderMessages(); input.value = ''; input.style.height = 'auto'; saveConvs(); saveSettings();

  streaming = true;
  var btn = document.getElementById('sendBtn');
  btn.textContent = 'Stop'; btn.className = 'send-btn stop'; btn.onclick = stopGen;

  var area = document.getElementById('chatArea');
  var typDiv = document.createElement('div'); typDiv.className = 'typing'; typDiv.id = 'typInd';
  typDiv.innerHTML = '<span>&#9679;</span><span>&#9679;</span><span>&#9679;</span>';
  area.appendChild(typDiv); area.scrollTop = area.scrollHeight;

  var apiMsgs = [];
  if (sysPr) apiMsgs.push({ role: 'system', content: sysPr });
  for (var i = 0; i < conv.messages.length; i++) {
    var apiMsg = { role: conv.messages[i].role, content: conv.messages[i].content };
    // Include images for Ollama multimodal models (llava, bakllava, etc.)
    if (conv.messages[i].images && conv.messages[i].images.length > 0) {
      apiMsg.images = [];
      for (var ii = 0; ii < conv.messages[i].images.length; ii++) {
        // Ollama expects base64 without data URL prefix
        var imgData = conv.messages[i].images[ii];
        if (imgData.indexOf(',') > -1) imgData = imgData.split(',')[1];
        apiMsg.images.push(imgData);
      }
    }
    apiMsgs.push(apiMsg);
  }

  var options = {};
  if (temp !== 0.7) options.temperature = temp;
  if (topP !== 0.9) options.top_p = topP;
  if (ctxLen !== 2048) options.num_ctx = ctxLen;
  if (maxTok > 0) options.num_predict = maxTok;
  if (rp !== 1.1) options.repeat_penalty = rp;
  if (seedVal >= 0) options.seed = seedVal;

  abortController = new AbortController();

  fetch(BASE + '/api/chat', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: model, messages: apiMsgs, stream: true, options: options }),
    signal: abortController.signal
  }).then(function(r) {
    var el = document.getElementById('typInd'); if (el) el.remove();
    var aDiv = document.createElement('div'); aDiv.className = 'msg assistant';
    aDiv.innerHTML = '<div class="bubble"></div><div class="meta"></div>';
    area.appendChild(aDiv);
    var bubble = aDiv.querySelector('.bubble'); var metaEl = aDiv.querySelector('.meta');
    var fullText = ''; var reader = r.body.getReader(); var decoder = new TextDecoder();
    function read() {
      reader.read().then(function(res) {
        if (res.done) { finish(fullText, model, metaEl, bubble); return; }
        var chunk = decoder.decode(res.value, { stream: true });
        var lines = chunk.split('\n');
        for (var j = 0; j < lines.length; j++) {
          if (!lines[j].startsWith('data: ')) continue;
          try { var d = JSON.parse(lines[j].slice(6));
            if (d.message && d.message.content) { fullText += d.message.content; bubble.innerHTML = md(fullText); area.scrollTop = area.scrollHeight; }
            if (d.done) { finish(fullText, model, metaEl, bubble); return; }
            if (d.error) { fullText += '\n\nError: ' + enhanceMemoryError(d.error); bubble.innerHTML = md(fullText); finish(fullText, model, metaEl, bubble); return; }
          } catch(e) {}
        }
        read();
      }).catch(function(e) { finish(fullText || (e.name === 'AbortError' ? '(stopped)' : 'Error: ' + e), model, metaEl, bubble); });
    }
    read();
  }).catch(function(e) {
    var el = document.getElementById('typInd'); if (el) el.remove();
    if (e.name !== 'AbortError') { conv.messages.push({ role: 'assistant', content: 'Error: ' + e, time: Date.now(), model: model }); renderMessages(); }
    resetBtn();
  });
}

function finish(text, model, metaEl, bubble) {
  var conv = conversations[currentChatId];
  if (conv) { conv.messages.push({ role: 'assistant', content: text, time: Date.now(), model: model }); saveConvs(); }
  var t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  var idx = conv ? conv.messages.length - 1 : 0;
  metaEl.innerHTML = esc(model) + ' &middot; ' + t + ' <button onclick="copyMessage(' + idx + ')" title="Copy">Copy</button>';
  bubble.innerHTML = md(text);
  resetBtn();
}

function resetBtn() {
  streaming = false; abortController = null;
  var btn = document.getElementById('sendBtn');
  btn.textContent = 'Send'; btn.className = 'send-btn'; btn.onclick = sendMessage; btn.disabled = false;
  document.getElementById('msgInput').focus();
}

function stopGen() { if (abortController) abortController.abort(); resetBtn(); }

// ── Pull / Delete ────────────────────────────────────────
function pullModel() {
  var input = document.getElementById('pullInput'); var name = input.value.trim();
  if (!name) return; var status = document.getElementById('pullStatus');
  status.textContent = 'Pulling ' + name + '...';
  fetch(BASE + '/api/models/pull', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: name}) })
  .then(function(r) { var reader = r.body.getReader(); var decoder = new TextDecoder();
    function read() { reader.read().then(function(res) { if (res.done) return; var chunk = decoder.decode(res.value);
      var lines = chunk.split('\n');
      for (var j = 0; j < lines.length; j++) { if (!lines[j].startsWith('data: ')) continue;
        try { var d = JSON.parse(lines[j].slice(6));
          if (d.status) { var pct = (d.completed && d.total) ? ' ' + Math.round(d.completed/d.total*100) + '%' : ''; status.textContent = d.status + pct; }
          if (d.status === 'success') { status.textContent = name + ' pulled successfully!'; loadModels(); input.value = ''; }
          if (d.error) status.textContent = 'Error: ' + enhanceMemoryError(d.error);
        } catch(e) {}
      } read();
    }); } read();
  }).catch(function(e) { status.textContent = 'Error: ' + e; });
}

function deleteModel(name) {
  if (!confirm('Delete model "' + name + '"?')) return;
  fetch(BASE + '/api/models/delete', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: name}) })
  .then(function() { loadModels(); });
}

// ── Export / Import ──────────────────────────────────────
function exportChats() {
  var data = JSON.stringify(conversations, null, 2);
  var blob = new Blob([data], {type: 'application/json'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'ollama-chats-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(a.href);
}
function importChats() { document.getElementById('importFile').click(); }
function handleImport(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader(); reader.onload = function(ev) {
    try { var data = JSON.parse(ev.target.result);
      var count = 0; for (var k in data) { if (data[k].messages) { conversations[k] = data[k]; count++; } }
      saveConvs(); renderChatList(); alert('Imported ' + count + ' conversations.');
    } catch(err) { alert('Invalid file format.'); }
  }; reader.readAsText(file); e.target.value = '';
}
function clearAllChats() {
  if (!confirm('Delete ALL conversations? This cannot be undone.')) return;
  conversations = {}; currentChatId = null; saveConvs(); renderChatList(); renderMessages();
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); document.getElementById('sidebar').classList.toggle('mobile-open'); }
function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); document.getElementById('settingsBtn').classList.toggle('active'); }
function toggleModels() { var o = document.getElementById('modelsOverlay'); o.classList.toggle('open'); if (o.classList.contains('open')) loadRunningModels(); }
// ── File Upload ──────────────────────────────────────────
var pendingFiles = []; // [{name, type, base64, isImage}]

function handleFiles(e) {
  var files = e.target.files;
  for (var i = 0; i < files.length; i++) {
    (function(file) {
      var reader = new FileReader();
      var isImage = file.type.startsWith('image/');
      reader.onload = function(ev) {
        var base64 = ev.target.result.split(',')[1];
        pendingFiles.push({ name: file.name, type: file.type, base64: base64, dataUrl: ev.target.result, isImage: isImage, size: file.size });
        renderFilePreview();
      };
      reader.readAsDataURL(file);
    })(files[i]);
  }
  e.target.value = '';
}

function removeFile(idx) {
  pendingFiles.splice(idx, 1);
  renderFilePreview();
}

function renderFilePreview() {
  var el = document.getElementById('filePreview');
  if (!pendingFiles.length) { el.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < pendingFiles.length; i++) {
    var f = pendingFiles[i];
    if (f.isImage) {
      html += '<div class="file-thumb"><img src="' + f.dataUrl + '"><button class="file-remove" onclick="removeFile(' + i + ')">&times;</button></div>';
    } else {
      html += '<div class="file-thumb"><div class="file-icon">' + esc(f.name) + '</div><button class="file-remove" onclick="removeFile(' + i + ')">&times;</button></div>';
    }
  }
  el.innerHTML = html;
}

function showImage(src) {
  document.getElementById('imgModalImg').src = src;
  document.getElementById('imgModal').style.display = 'flex';
}

function doLogout() { fetch(BASE + '/api/logout', {method:'POST'}).then(function() { window.location.href = '/login'; }); }

// ── Sliders ──────────────────────────────────────────────
document.getElementById('temperature').addEventListener('input', function() { document.getElementById('tempVal').textContent = this.value; });
document.getElementById('topP').addEventListener('input', function() { document.getElementById('topPVal').textContent = this.value; });
document.getElementById('repeatPenalty').addEventListener('input', function() { document.getElementById('rpVal').textContent = this.value; });
document.getElementById('msgInput').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 200) + 'px'; });
// Drag & drop files
var inputArea = document.querySelector('.input-area');
inputArea.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); inputArea.style.borderColor = 'var(--accent)'; });
inputArea.addEventListener('dragleave', function(e) { e.preventDefault(); inputArea.style.borderColor = ''; });
inputArea.addEventListener('drop', function(e) { e.preventDefault(); inputArea.style.borderColor = ''; if (e.dataTransfer.files.length) { handleFiles({target: {files: e.dataTransfer.files, value: ''}}); } });
// Paste images
document.getElementById('msgInput').addEventListener('paste', function(e) {
  var items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      var file = items[i].getAsFile();
      handleFiles({target: {files: [file], value: ''}});
    }
  }
});
document.getElementById('msgInput').addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!streaming) sendMessage(); } });
document.getElementById('modelSelect').addEventListener('change', function() { savedModel = this.value; saveSettings(); });

// ── Auth ─────────────────────────────────────────────────
function checkAuth() {
  fetch(BASE + '/api/auth-status').then(function(r) { return r.json(); }).then(function(j) {
    if (j.auth_required) document.getElementById('logoutBtn').style.display = '';
  }).catch(function() {});
}

// ── Init ─────────────────────────────────────────────────
loadConvs();
var cfg = loadSettingsFromStorage();
if (cfg && cfg.model) savedModel = cfg.model;
var keys = Object.keys(conversations);
if (keys.length) { keys.sort(function(a, b) { return (conversations[b].created||0) - (conversations[a].created||0); }); currentChatId = keys[0]; }
renderChatList(); renderMessages(); checkHealth(); checkAuth();
setInterval(checkHealth, 15000);
</script>
</body>
</html>

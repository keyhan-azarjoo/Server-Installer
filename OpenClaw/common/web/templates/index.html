<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.header{background:#1e293b;border-bottom:1px solid #334155;padding:12px 24px;display:flex;align-items:center;gap:16px}
.header h1{font-size:20px;font-weight:800;color:#f97316}
.header .status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8}
.header .dot{width:8px;height:8px;border-radius:50%;background:#ef4444}.header .dot.ok{background:#22c55e}
.header .btn-sm{background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}
.header .btn-sm:hover{background:#475569;color:#e2e8f0}
.output-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px}
.task-block{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px}
.task-block .task-label{font-size:12px;color:#f97316;font-weight:700;margin-bottom:8px}
.task-block .task-text{font-size:15px;margin-bottom:12px}
.task-block pre{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;font-size:13px;line-height:1.5;overflow-x:auto;white-space:pre-wrap;color:#94a3b8}
.task-block .result{margin-top:8px;padding:12px;background:#0f172a;border-radius:8px;border:1px solid #334155;font-size:14px;white-space:pre-wrap;line-height:1.6}
.empty{text-align:center;margin:auto;color:#475569}
.empty h2{font-size:28px;font-weight:800;color:#334155;margin-bottom:8px}
.input-area{background:#1e293b;border-top:1px solid #334155;padding:16px 24px}
.input-row{display:flex;gap:12px;max-width:900px;margin:0 auto}
.input-row textarea{flex:1;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;resize:none;outline:none;min-height:48px;max-height:200px}
.input-row textarea:focus{border-color:#f97316}
.run-btn{background:#f97316;color:#fff;border:none;border-radius:12px;padding:0 24px;font-size:15px;font-weight:700;cursor:pointer;min-width:80px}
.run-btn:hover{background:#ea580c}.run-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
</style>
</head>
<body>
<div class="header">
  <h1>OpenClaw</h1>
  <div class="status"><div class="dot" id="statusDot"></div><span id="statusText">Checking...</span></div>
  <button class="btn-sm" onclick="document.getElementById('outputArea').innerHTML='<div class=empty><h2>OpenClaw Agent</h2><p>Describe a task and the agent will execute it.</p></div>'">Clear</button>
</div>
<div class="output-area" id="outputArea">
  <div class="empty"><h2>OpenClaw Agent</h2><p>Describe a task and the agent will execute it.<br>Examples: "list all Python files", "create a hello world Flask app", "check disk usage"</p></div>
</div>
<div class="input-area">
  <div class="input-row">
    <textarea id="taskInput" placeholder="Describe a task... (Enter to run)" rows="1"></textarea>
    <button class="run-btn" id="runBtn" onclick="runTask()">Run</button>
  </div>
</div>
<script>
let running = false;
async function checkHealth() {
  try {
    const r = await fetch('/api/health'); const j = await r.json();
    document.getElementById('statusDot').className = 'dot' + (j.ok ? ' ok' : '');
    document.getElementById('statusText').textContent = j.ok ? 'Ready' + (j.version ? ' ('+j.version+')' : '') : 'Not connected';
  } catch(e) {
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = 'Disconnected';
  }
}
async function runTask() {
  const input = document.getElementById('taskInput');
  const task = input.value.trim();
  if (!task || running) return;
  running = true; document.getElementById('runBtn').disabled = true;
  const area = document.getElementById('outputArea');
  if (area.querySelector('.empty')) area.innerHTML = '';
  const block = document.createElement('div'); block.className = 'task-block';
  block.innerHTML = '<div class="task-label">TASK</div><div class="task-text">' + task.replace(/</g,'&lt;') + '</div><pre class="result">Running...</pre>';
  area.appendChild(block); area.scrollTop = area.scrollHeight;
  input.value = ''; input.style.height = 'auto';
  const resultEl = block.querySelector('.result');
  try {
    const r = await fetch('/api/run/stream', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({task}) });
    const reader = r.body.getReader(); const decoder = new TextDecoder(); let text = '';
    while (true) {
      const {done, value} = await reader.read(); if (done) break;
      const chunk = decoder.decode(value);
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        try { const d = JSON.parse(line.slice(6)); if (d.line !== undefined) { text += d.line + '\n'; resultEl.textContent = text; area.scrollTop = area.scrollHeight; } } catch(e) {}
      }
    }
    if (!text.trim()) resultEl.textContent = '(no output)';
  } catch(e) { resultEl.textContent = 'Error: ' + e; }
  running = false; document.getElementById('runBtn').disabled = false; input.focus();
}
document.getElementById('taskInput').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 200) + 'px'; });
document.getElementById('taskInput').addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runTask(); } });
checkHealth(); setInterval(checkHealth, 15000);
</script>
</body>
</html>

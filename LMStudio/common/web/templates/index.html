<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LM Studio</title>
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--border:#334155;--border2:#475569;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;--accent:#8b5cf6;--accent2:#7c3aed;--accent3:#6d28d9;--danger:#ef4444;--success:#22c55e;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.sidebar{width:300px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;transition:width .3s}
.sidebar.collapsed{width:0;overflow:hidden;border:none}
.sb-top{padding:16px;border-bottom:1px solid var(--border)}
.sb-top-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sb-top h1{font-size:20px;font-weight:800;color:var(--accent);flex:1}
.sb-top h1 span{font-size:11px;font-weight:400;color:var(--text3);margin-left:6px}
.new-chat-btn{background:var(--accent2);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:background .15s}
.new-chat-btn:hover{background:var(--accent3)}
.sb-search{margin-top:10px}
.sb-search input{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
.sb-search input:focus{border-color:var(--accent)}
.chat-list{flex:1;overflow-y:auto;padding:6px}
.chat-date{font-size:11px;color:var(--text3);padding:8px 12px 4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.chat-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px;margin-bottom:1px;transition:background .1s}
.chat-item:hover{background:var(--border)}
.chat-item.active{background:var(--border);color:var(--text)}
.chat-item .ci-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .ci-actions{display:none;gap:2px}
.chat-item:hover .ci-actions{display:flex}
.ci-btn{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:2px 4px;border-radius:4px}
.ci-btn:hover{color:var(--text);background:var(--border2)}
.ci-btn.del:hover{color:var(--danger)}
.sb-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.sb-footer-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;flex:1;text-align:center;transition:all .15s}
.sb-footer-btn:hover{background:var(--border);color:var(--text)}

.main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.toggle-sb{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:6px}
.toggle-sb:hover{background:var(--border)}
.hdr-model select{background:var(--border);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:7px 12px;font-size:13px;outline:none;min-width:200px;cursor:pointer}
.hdr-model select:focus{border-color:var(--accent)}
.hdr-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);flex-shrink:0}
.hdr-dot.ok{background:var(--success)}
.hdr-spacer{flex:1}
.hdr-btn{background:var(--border);color:var(--text2);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hdr-btn:hover{background:var(--border2);color:var(--text)}
.hdr-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.hdr-badge{font-size:10px;background:var(--border);color:var(--text3);padding:3px 8px;border-radius:4px}

.settings-panel{display:none;background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 20px;flex-shrink:0;overflow-y:auto;max-height:260px}
.settings-panel.open{display:block}
.stg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;max-width:740px}
.stg-grp{display:flex;flex-direction:column;gap:4px}
.stg-grp label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stg-grp input,.stg-grp textarea{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
.stg-grp input:focus,.stg-grp textarea:focus{border-color:var(--accent)}
.stg-grp textarea{resize:vertical;min-height:64px}
.stg-grp.full{grid-column:1/-1}
.range-row{display:flex;align-items:center;gap:8px}
.range-row input[type=range]{flex:1;accent-color:var(--accent)}
.range-val{font-size:12px;color:var(--accent);min-width:32px;text-align:right;font-weight:600}

.chat-area{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px}
.empty-state{margin:auto;text-align:center;max-width:500px;padding:40px}
.empty-state h2{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--accent),#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.empty-state p{color:var(--text3);font-size:15px;line-height:1.6;margin-bottom:24px}
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sug-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:13px;color:var(--text2);cursor:pointer;text-align:left;transition:border-color .15s}
.sug-card:hover{border-color:var(--accent);color:var(--text)}
.sug-card strong{display:block;color:var(--text);margin-bottom:4px}
.info-banner{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:12px;font-size:13px;color:var(--text2);line-height:1.6;text-align:center}

.msg{max-width:85%;display:flex;flex-direction:column;gap:4px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start;max-width:90%}
.msg .bubble{padding:14px 18px;border-radius:16px;line-height:1.7;font-size:14px;word-break:break-word}
.msg.user .bubble{background:var(--accent2);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg .meta{font-size:11px;color:var(--text3);padding:0 6px;display:flex;gap:8px;align-items:center}
.msg.user .meta{justify-content:flex-end}
.msg .meta button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:2px}
.msg .meta button:hover{color:var(--text)}
.typing{align-self:flex-start;color:var(--text3);font-size:14px;padding:8px 0}
.typing span{display:inline-block;animation:bounce 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}

.msg.assistant .bubble pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin:10px 0;overflow-x:auto;font-size:13px;line-height:1.6;position:relative}
.msg.assistant .bubble pre code{background:none;border:none;padding:0;color:var(--text)}
.msg.assistant .bubble code{background:var(--border);padding:2px 6px;border-radius:4px;font-size:13px}
.msg.assistant .bubble p{margin:6px 0}
.msg.assistant .bubble ul,.msg.assistant .bubble ol{margin:6px 0;padding-left:22px}
.msg.assistant .bubble li{margin:4px 0;line-height:1.6}
.msg.assistant .bubble h1,.msg.assistant .bubble h2,.msg.assistant .bubble h3{margin:12px 0 6px;color:var(--accent)}
.msg.assistant .bubble blockquote{border-left:3px solid var(--accent);padding:4px 12px;margin:8px 0;color:var(--text2);background:rgba(139,92,246,0.05);border-radius:0 6px 6px 0}
.msg.assistant .bubble table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13px}
.msg.assistant .bubble th,.msg.assistant .bubble td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.msg.assistant .bubble th{background:var(--border);font-weight:600}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--border2);color:var(--text);border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .2s}
pre:hover .copy-btn{opacity:1}
.copy-btn:hover{background:var(--accent)}

.input-area{background:var(--bg2);border-top:1px solid var(--border);padding:12px 20px;flex-shrink:0}
.input-container{max-width:900px;margin:0 auto}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-row textarea{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:14px;padding:12px 16px;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:48px;max-height:200px;transition:border-color .15s}
.input-row textarea:focus{border-color:var(--accent)}
.input-row textarea::placeholder{color:var(--text4)}
.send-btn{background:var(--accent2);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;min-width:72px;transition:all .15s}
.send-btn:hover{background:var(--accent3)}
.send-btn:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
.send-btn.stop{background:var(--danger)}
.send-btn.stop:hover{background:#dc2626}
.input-hint{font-size:11px;color:var(--text4);margin-top:6px;text-align:center}

@media(max-width:768px){.sidebar{position:fixed;z-index:100;width:300px;left:-300px;transition:left .3s}.sidebar.mobile-open{left:0}.suggestions{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-top-row"><h1>LM Studio<span id="modelCount"></span></h1></div>
    <button class="new-chat-btn" onclick="newChat()">+ New Conversation</button>
    <div class="sb-search"><input type="text" id="searchChats" placeholder="Search conversations..." oninput="renderChatList()"></div>
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="sb-footer">
    <button class="sb-footer-btn" onclick="exportChats()">Export</button>
    <button class="sb-footer-btn" onclick="importChats()">Import</button>
    <button class="sb-footer-btn" onclick="clearAllChats()">Clear All</button>
  </div>
</div>

<div class="main">
  <div class="header">
    <button class="toggle-sb" onclick="toggleSidebar()">&#9776;</button>
    <div class="hdr-model"><select id="modelSelect"><option value="">Loading...</option></select></div>
    <div class="hdr-status"><div class="hdr-dot" id="statusDot"></div><span id="statusText">Connecting...</span></div>
    <span class="hdr-badge">OpenAI-compatible</span>
    <div class="hdr-spacer"></div>
    <button class="hdr-btn" id="settingsBtn" onclick="toggleSettings()">Settings</button>
    <button class="hdr-btn" id="logoutBtn" onclick="doLogout()" style="display:none">Logout</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="stg-grid">
      <div class="stg-grp full"><label>System Prompt</label><textarea id="systemPrompt" placeholder="You are a helpful assistant..." rows="3"></textarea></div>
      <div class="stg-grp"><label>Temperature</label><div class="range-row"><input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7"><span class="range-val" id="tempVal">0.7</span></div></div>
      <div class="stg-grp"><label>Top P</label><div class="range-row"><input type="range" id="topP" min="0" max="1" step="0.05" value="0.9"><span class="range-val" id="topPVal">0.9</span></div></div>
      <div class="stg-grp"><label>Max Tokens (0 = default)</label><input type="number" id="maxTokens" value="0" min="0" max="131072" step="64"></div>
      <div class="stg-grp"><label>Frequency Penalty</label><div class="range-row"><input type="range" id="freqPenalty" min="0" max="2" step="0.1" value="0"><span class="range-val" id="freqVal">0</span></div></div>
      <div class="stg-grp"><label>Presence Penalty</label><div class="range-row"><input type="range" id="presPenalty" min="0" max="2" step="0.1" value="0"><span class="range-val" id="presVal">0</span></div></div>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="input-container">
      <div class="input-row">
        <textarea id="msgInput" placeholder="Message LM Studio... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
      <div class="input-hint">LM Studio runs locally. Models are managed in the LM Studio desktop app.</div>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
var BASE = '';
var conversations = {};
var currentChatId = null;
var streaming = false;
var abortController = null;
var savedModel = '';

function saveConvs() { try { localStorage.setItem('lms_chats', JSON.stringify(conversations)); } catch(e) {} }
function loadConvs() { try { var s = localStorage.getItem('lms_chats'); if (s) conversations = JSON.parse(s); } catch(e) {} }
function saveSettings() {
  try { localStorage.setItem('lms_cfg', JSON.stringify({
    systemPrompt: document.getElementById('systemPrompt').value,
    temperature: document.getElementById('temperature').value,
    topP: document.getElementById('topP').value,
    maxTokens: document.getElementById('maxTokens').value,
    freqPenalty: document.getElementById('freqPenalty').value,
    presPenalty: document.getElementById('presPenalty').value,
    model: document.getElementById('modelSelect').value
  })); } catch(e) {}
}
function loadCfg() {
  try { var s = localStorage.getItem('lms_cfg'); if (!s) return null; var c = JSON.parse(s);
    if (c.systemPrompt) document.getElementById('systemPrompt').value = c.systemPrompt;
    if (c.temperature) { document.getElementById('temperature').value = c.temperature; document.getElementById('tempVal').textContent = c.temperature; }
    if (c.topP) { document.getElementById('topP').value = c.topP; document.getElementById('topPVal').textContent = c.topP; }
    if (c.maxTokens !== undefined) document.getElementById('maxTokens').value = c.maxTokens;
    if (c.freqPenalty !== undefined) { document.getElementById('freqPenalty').value = c.freqPenalty; document.getElementById('freqVal').textContent = c.freqPenalty; }
    if (c.presPenalty !== undefined) { document.getElementById('presPenalty').value = c.presPenalty; document.getElementById('presVal').textContent = c.presPenalty; }
    return c;
  } catch(e) {} return null;
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
function newChat() { var id = genId(); conversations[id] = { id:id, title:'New Chat', messages:[], created:Date.now() }; currentChatId = id; saveConvs(); renderChatList(); renderMessages(); document.getElementById('msgInput').focus(); }
function switchChat(id) { if (streaming) return; currentChatId = id; renderChatList(); renderMessages(); }
function deleteChat(id, e) { e.stopPropagation(); delete conversations[id]; if (currentChatId===id) { var k=Object.keys(conversations); currentChatId=k.length?k[k.length-1]:null; } saveConvs(); renderChatList(); renderMessages(); }
function renameChat(id, e) { e.stopPropagation(); var c=conversations[id]; if(!c)return; var n=prompt('Rename:',c.title); if(n&&n.trim()){c.title=n.trim();saveConvs();renderChatList();} }
function updateTitle(id) { var c=conversations[id]; if(!c)return; for(var i=0;i<c.messages.length;i++){if(c.messages[i].role==='user'){var t=c.messages[i].content.substring(0,45);c.title=c.messages[i].content.length>45?t+'...':t;break;}} saveConvs();renderChatList(); }

function renderChatList() {
  var list=document.getElementById('chatList'); var search=(document.getElementById('searchChats').value||'').toLowerCase();
  var keys=Object.keys(conversations).sort(function(a,b){return(conversations[b].created||0)-(conversations[a].created||0);});
  var html='',lastDate='';
  for(var i=0;i<keys.length;i++){var c=conversations[keys[i]];
    if(search&&(c.title||'').toLowerCase().indexOf(search)===-1)continue;
    var d=new Date(c.created||0);var ds=d.toLocaleDateString();var today=new Date().toLocaleDateString();var yesterday=new Date(Date.now()-86400000).toLocaleDateString();
    var label=ds===today?'Today':ds===yesterday?'Yesterday':ds;
    if(label!==lastDate){html+='<div class="chat-date">'+label+'</div>';lastDate=label;}
    var active=keys[i]===currentChatId?' active':'';
    html+='<div class="chat-item'+active+'" onclick="switchChat(\''+keys[i]+'\')">'
      +'<span class="ci-title">'+esc(c.title||'New Chat')+'</span>'
      +'<span class="ci-actions"><button class="ci-btn" onclick="renameChat(\''+keys[i]+'\',event)">&#9998;</button><button class="ci-btn del" onclick="deleteChat(\''+keys[i]+'\',event)">&times;</button></span></div>';
  }
  if(!html)html='<div style="text-align:center;color:var(--text4);padding:40px 16px;font-size:13px">No conversations yet</div>';
  list.innerHTML=html;
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function md(text){
  text=text.replace(/```(\w*)\n([\s\S]*?)```/g,function(m,lang,code){return'<pre><code class="lang-'+lang+'">'+esc(code.trim())+'</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></pre>';});
  text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/^### (.+)$/gm,'<h3>$1</h3>');text=text.replace(/^## (.+)$/gm,'<h2>$1</h2>');text=text.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  text=text.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  text=text.replace(/^[*\-]\s(.+)$/gm,'<li>$1</li>');text=text.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');text=text.replace(/<\/ul>\s*<ul>/g,'');
  text=text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
  var parts=text.split(/<pre[\s\S]*?<\/pre>/g);var pres=text.match(/<pre[\s\S]*?<\/pre>/g)||[];var r='';
  for(var i=0;i<parts.length;i++){r+=parts[i].replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');if(i<pres.length)r+=pres[i];}
  return'<p>'+r+'</p>';
}
function copyCode(btn){var code=btn.parentElement.querySelector('code');navigator.clipboard.writeText(code.textContent);btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy';},2000);}
function copyMessage(idx){var c=conversations[currentChatId];if(c&&c.messages[idx])navigator.clipboard.writeText(c.messages[idx].content);}

function renderMessages(){
  var area=document.getElementById('chatArea');
  if(!currentChatId||!conversations[currentChatId]){
    area.innerHTML='<div class="empty-state"><h2>LM Studio Chat</h2><p>To start chatting, you need to set up LM Studio:</p>'
      +'<div style="text-align:left;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin:16px 0;font-size:13px;line-height:2;color:var(--text2)">'
      +'<strong style="color:var(--text)">Setup Steps:</strong><br>'
      +'1. Open <strong>LM Studio</strong> desktop app on this computer<br>'
      +'2. Download a model (e.g. Llama 3, Mistral, Qwen)<br>'
      +'3. Load the model in LM Studio<br>'
      +'4. Go to <strong>Developer</strong> tab &rarr; Click <strong>Start Server</strong><br>'
      +'5. The status above will change to <strong style="color:#22c55e">Connected</strong></div><p style="font-size:13px;color:var(--text3)">LM Studio server runs on port 1234. This web UI connects to it automatically.</p>'
      +'<div class="suggestions"><div class="sug-card" onclick="useSug(this)"><strong>Explain</strong>The difference between transformers and RNNs</div>'
      +'<div class="sug-card" onclick="useSug(this)"><strong>Write</strong>A TypeScript function for debouncing</div>'
      +'<div class="sug-card" onclick="useSug(this)"><strong>Analyze</strong>Pros and cons of microservices architecture</div>'
      +'<div class="sug-card" onclick="useSug(this)"><strong>Help</strong>Optimize a slow SQL query with JOINs</div></div></div>';
    return;
  }
  var msgs=conversations[currentChatId].messages;
  if(!msgs.length){area.innerHTML='<div class="empty-state"><h2>New Conversation</h2><p>Type a message below to get started.</p></div>';return;}
  var html='';
  for(var i=0;i<msgs.length;i++){var m=msgs[i];if(m.role==='system')continue;
    var t=m.time?new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
    if(m.role==='user'){html+='<div class="msg user"><div class="bubble">'+esc(m.content)+'</div><div class="meta">'+t+' <button onclick="copyMessage('+i+')">Copy</button></div></div>';}
    else{var info=(m.model?esc(m.model)+' &middot; ':'')+t;html+='<div class="msg assistant"><div class="bubble">'+md(m.content)+'</div><div class="meta">'+info+' <button onclick="copyMessage('+i+')">Copy</button></div></div>';}
  }
  area.innerHTML=html;area.scrollTop=area.scrollHeight;
}
function useSug(el){var t=el.textContent.replace(/^(Explain|Write|Analyze|Help)/,'').trim();document.getElementById('msgInput').value=t;document.getElementById('msgInput').focus();}

function checkHealth(){
  fetch(BASE+'/api/health').then(function(r){return r.json();}).then(function(j){
    var serverOk = j.lm_server !== false && j.status !== 'web_ui_only';
    document.getElementById('statusDot').className='hdr-dot'+(serverOk?' ok':'');
    if(serverOk){
      document.getElementById('statusText').textContent='Connected';
      loadModels();
      if(j.model_count!==undefined)document.getElementById('modelCount').textContent=j.model_count+' loaded';
    } else {
      document.getElementById('statusText').textContent='Start LM Studio server (Developer > Start)';
      document.getElementById('modelCount').textContent='';
    }
  }).catch(function(){document.getElementById('statusDot').className='hdr-dot';document.getElementById('statusText').textContent='Web UI offline';});
}

function loadModels(){
  fetch(BASE+'/api/models').then(function(r){return r.json();}).then(function(j){
    var sel=document.getElementById('modelSelect');var models=j.models||[];var prev=sel.value||savedModel;
    sel.innerHTML=models.length?'':'<option value="">No models loaded — start one in LM Studio</option>';
    for(var i=0;i<models.length;i++){var m=models[i];var name=m.id||m.name||m.model;var opt=document.createElement('option');opt.value=name;opt.textContent=name;if(name===prev)opt.selected=true;sel.appendChild(opt);}
    document.getElementById('modelCount').textContent=models.length+' loaded';
  }).catch(function(){});
}

function sendMessage(){
  var input=document.getElementById('msgInput');var text=input.value.trim();var model=document.getElementById('modelSelect').value;
  if(!text||!model||streaming)return;
  if(!currentChatId)newChat();var conv=conversations[currentChatId];
  var sysPr=document.getElementById('systemPrompt').value.trim();
  var temp=parseFloat(document.getElementById('temperature').value);
  var topP=parseFloat(document.getElementById('topP').value);
  var maxTok=parseInt(document.getElementById('maxTokens').value)||0;
  var freqP=parseFloat(document.getElementById('freqPenalty').value);
  var presP=parseFloat(document.getElementById('presPenalty').value);

  conv.messages.push({role:'user',content:text,time:Date.now()});
  if(conv.messages.length<=2)updateTitle(currentChatId);
  renderMessages();input.value='';input.style.height='auto';saveConvs();saveSettings();
  streaming=true;var btn=document.getElementById('sendBtn');btn.textContent='Stop';btn.className='send-btn stop';btn.onclick=stopGen;

  var area=document.getElementById('chatArea');
  var typDiv=document.createElement('div');typDiv.className='typing';typDiv.id='typInd';
  typDiv.innerHTML='<span>&#9679;</span><span>&#9679;</span><span>&#9679;</span>';area.appendChild(typDiv);area.scrollTop=area.scrollHeight;

  var apiMsgs=[];if(sysPr)apiMsgs.push({role:'system',content:sysPr});
  for(var i=0;i<conv.messages.length;i++)apiMsgs.push({role:conv.messages[i].role,content:conv.messages[i].content});

  var payload={model:model,messages:apiMsgs,stream:true};
  if(temp!==0.7)payload.temperature=temp;if(topP!==0.9)payload.top_p=topP;
  if(maxTok>0)payload.max_tokens=maxTok;if(freqP>0)payload.frequency_penalty=freqP;if(presP>0)payload.presence_penalty=presP;

  abortController=new AbortController();
  fetch(BASE+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:abortController.signal})
  .then(function(r){
    var el=document.getElementById('typInd');if(el)el.remove();
    var ct=r.headers.get('content-type')||'';
    if(ct.indexOf('event-stream')!==-1){
      var aDiv=document.createElement('div');aDiv.className='msg assistant';aDiv.innerHTML='<div class="bubble"></div><div class="meta"></div>';
      area.appendChild(aDiv);var bubble=aDiv.querySelector('.bubble');var metaEl=aDiv.querySelector('.meta');
      var fullText='';var reader=r.body.getReader();var decoder=new TextDecoder();
      function read(){reader.read().then(function(res){if(res.done){finish(fullText,model,metaEl,bubble);return;}
        var chunk=decoder.decode(res.value,{stream:true});var lines=chunk.split('\n');
        for(var j=0;j<lines.length;j++){var line=lines[j].trim();if(!line.startsWith('data: '))continue;var ds=line.slice(6);
          if(ds==='[DONE]'){finish(fullText,model,metaEl,bubble);return;}
          try{var d=JSON.parse(ds);
            if(d.choices&&d.choices[0]&&d.choices[0].delta&&d.choices[0].delta.content){fullText+=d.choices[0].delta.content;bubble.innerHTML=md(fullText);area.scrollTop=area.scrollHeight;}
            if(d.choices&&d.choices[0]&&d.choices[0].finish_reason==='stop'){finish(fullText,model,metaEl,bubble);return;}
            if(d.message&&d.message.content){fullText+=d.message.content;bubble.innerHTML=md(fullText);area.scrollTop=area.scrollHeight;}
            if(d.error){fullText+='\n\nError: '+d.error;bubble.innerHTML=md(fullText);finish(fullText,model,metaEl,bubble);return;}
          }catch(e){}
        }read();
      }).catch(function(e){finish(fullText||(e.name==='AbortError'?'(stopped)':'Error: '+e),model,metaEl,bubble);});}read();
    }else{r.json().then(function(j){var content='';if(j.choices&&j.choices[0]&&j.choices[0].message)content=j.choices[0].message.content;else if(j.content)content=j.content;else if(j.error)content='Error: '+j.error;else content='No response.';conv.messages.push({role:'assistant',content:content,time:Date.now(),model:model});saveConvs();renderMessages();resetBtn();});}
  }).catch(function(e){var el=document.getElementById('typInd');if(el)el.remove();if(e.name!=='AbortError'){conv.messages.push({role:'assistant',content:'Error: '+e,time:Date.now(),model:model});renderMessages();}resetBtn();});
}

function finish(text,model,metaEl,bubble){var conv=conversations[currentChatId];if(conv){conv.messages.push({role:'assistant',content:text,time:Date.now(),model:model});saveConvs();}var t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});var idx=conv?conv.messages.length-1:0;metaEl.innerHTML=esc(model)+' &middot; '+t+' <button onclick="copyMessage('+idx+')">Copy</button>';bubble.innerHTML=md(text);resetBtn();}
function resetBtn(){streaming=false;abortController=null;var btn=document.getElementById('sendBtn');btn.textContent='Send';btn.className='send-btn';btn.onclick=sendMessage;btn.disabled=false;document.getElementById('msgInput').focus();}
function stopGen(){if(abortController)abortController.abort();resetBtn();}

function exportChats(){var data=JSON.stringify(conversations,null,2);var blob=new Blob([data],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lmstudio-chats-'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importChats(){document.getElementById('importFile').click();}
function handleImport(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){try{var data=JSON.parse(ev.target.result);var count=0;for(var k in data){if(data[k].messages){conversations[k]=data[k];count++;}}saveConvs();renderChatList();alert('Imported '+count+' conversations.');}catch(err){alert('Invalid file format.');}};reader.readAsText(file);e.target.value='';}
function clearAllChats(){if(!confirm('Delete ALL conversations?'))return;conversations={};currentChatId=null;saveConvs();renderChatList();renderMessages();}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed');document.getElementById('sidebar').classList.toggle('mobile-open');}
function toggleSettings(){document.getElementById('settingsPanel').classList.toggle('open');document.getElementById('settingsBtn').classList.toggle('active');}
function doLogout(){fetch(BASE+'/api/logout',{method:'POST'}).then(function(){window.location.href='/login';});}

document.getElementById('temperature').addEventListener('input',function(){document.getElementById('tempVal').textContent=this.value;});
document.getElementById('topP').addEventListener('input',function(){document.getElementById('topPVal').textContent=this.value;});
document.getElementById('freqPenalty').addEventListener('input',function(){document.getElementById('freqVal').textContent=this.value;});
document.getElementById('presPenalty').addEventListener('input',function(){document.getElementById('presVal').textContent=this.value;});
document.getElementById('msgInput').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,200)+'px';});
document.getElementById('msgInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(!streaming)sendMessage();}});
document.getElementById('modelSelect').addEventListener('change',function(){savedModel=this.value;saveSettings();});

function checkAuth(){fetch(BASE+'/api/auth-status').then(function(r){return r.json();}).then(function(j){if(j.auth_required)document.getElementById('logoutBtn').style.display='';}).catch(function(){});}

loadConvs();var cfg=loadCfg();if(cfg&&cfg.model)savedModel=cfg.model;
var keys=Object.keys(conversations);if(keys.length){keys.sort(function(a,b){return(conversations[b].created||0)-(conversations[a].created||0);});currentChatId=keys[0];}
renderChatList();renderMessages();checkHealth();checkAuth();setInterval(checkHealth,15000);
</script>
</body>
</html>
